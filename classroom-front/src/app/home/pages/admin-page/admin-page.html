<!-- ADMIN: tabla -->
<div *ngIf="rol === 'admin'" class="p-6">
  <h2 class="text-xl font-semibold mb-4">Usuarios y sus clases</h2>

  <div *ngIf="loadingAdmin" class="text-gray-600">Cargando...</div>
  <div *ngIf="adminError" class="text-red-600">{{ adminError }}</div>

  <div class="overflow-auto rounded-xl border border-gray-200 bg-white shadow-sm">
    <table class="min-w-[900px] w-full text-sm">
      <thead class="bg-gray-50 text-gray-700">
        <tr>
          <th class="text-left px-4 py-3">UsuarioId</th>
          <th class="text-left px-4 py-3">Nombre</th>
          <th class="text-left px-4 py-3">Email</th>
          <th class="text-left px-4 py-3">Rol</th>
          <th class="text-left px-4 py-3">Clases</th>
          <th class="px-4 py-3 text-left">Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let u of adminRows" class="border-t">
          <td class="px-4 py-3">{{ u.usuarioId }}</td>
          <td class="px-4 py-3">{{ u.nombre }}</td>
          <td class="px-4 py-3">{{ u.email }}</td>
          <td class="px-4 py-3">
            <span class="px-2 py-1 rounded-full bg-gray-100">{{ u.rol }}</span>
          </td>
          <td class="px-4 py-3">
            <div class="flex flex-wrap gap-2">
              <span *ngFor="let c of u.clases"
                    class="px-2 py-1 rounded-lg bg-indigo-50 text-indigo-700">
                {{ c }}
              </span>

              <span *ngIf="u.clases.length === 0" class="text-gray-400">
                (sin clases)
              </span>
            </div>
          </td>
          <td class="px-4 py-3">
            <button
                type="button"
                (click)="borrarUsuario(u.usuarioId)"
                class="px-3 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm">
                Borrar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
