<div class="min-h-screen bg-gray-50 flex items-start justify-center">
  <div class="w-full max-w-5xl px-6 py-10">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
      <!-- Header -->
      <div class="px-6 py-5 border-b border-gray-200">
        <h1 class="text-lg font-semibold text-gray-900">Crear clase</h1>
        <p class="text-sm text-gray-500 mt-1">
          Completa los datos. El código de acceso se generará automáticamente.
        </p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="crearClase()" class="px-6 py-6 space-y-5">
        <!-- Nombre -->
        <div>
          <label class="block text-sm font-medium text-gray-700">
            Nombre de la clase <span class="text-red-500">*</span>
          </label>
          <input
          [(ngModel)]="nombre"
          name="nombre"
          type="nombre"
            type="text"
            placeholder="Ej. Matemáticas "
            class="mt-2 w-full h-11 rounded-xl border border-gray-200 px-4 text-sm outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-300"
          />
        </div>

        <!-- Curso -->
        <div>
          <label class="block text-sm font-medium text-gray-700">
            Curso <span class="text-red-500">*</span>
          </label>
          <input
          [(ngModel)]="curso"
          name="curso"
          type="curso"
            type="text"
            placeholder="Ej. 1ºESO"
            class="mt-2 w-full h-11 rounded-xl border border-gray-200 px-4 text-sm outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-300"
          />
        </div>

        <!-- Aula -->
        <div>
          <label class="block text-sm font-medium text-gray-700">
            Aula <span class="text-red-500">*</span>
          </label>
          <input
          [(ngModel)]="aula"
          name="aula"
          type="aula"
            type="text"
            placeholder="Ej. Aula 101"
            class="mt-2 w-full h-11 rounded-xl border border-gray-200 px-4 text-sm outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-300"
          />
        </div>
          <!-- Color (desplegable) -->
       <div>
          <label class="block text-sm font-medium text-gray-700">
            Color de la clase <span class="text-red-500">*</span>
          </label>

          <div class="mt-2 flex items-center gap-3">
            <select
              [(ngModel)]="color"
              name="color"
              required
              class="w-full h-11 rounded-xl border border-gray-200 px-3 text-sm bg-white outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-300"
            >
              <option value="" disabled>Selecciona un color</option>
              <option value="blue">Azul</option>
              <option value="red">Rojo</option>
              <option value="green">Verde</option>
              <option value="orange">Naranja</option>
              <option value="purple">Morado</option>
              <option value="pink">Rosa</option>
              <option value="teal">Turquesa</option>
              <option value="gray">Gris</option>
              <option value="yellow">Amarillo</option>
              <option value="brown">Marrón</option>
            </select>

            <!-- Preview dinámico -->
            <div
              class="h-11 w-11 rounded-xl border border-gray-200"
              [ngStyle]="{ 'background-color': color || '#6366f1' }"
            ></div>
          </div>
          <p class="mt-2 text-xs text-gray-500">
            Elige un color para la cabecera de la tarjeta en “Mis clases”.
          </p>
        </div>

        <!-- Info -->
        <div class="rounded-2xl border border-indigo-100 bg-indigo-50 p-4">
          <div class="flex gap-3">
            <div class="mt-0.5">
              <div class="h-8 w-8 rounded-full bg-indigo-600 text-white grid place-items-center">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z" />
                </svg>
              </div>
            </div>
            <div>
              <p class="text-sm font-semibold text-indigo-900">Código de acceso</p>
              <p class="text-sm text-indigo-900/80 mt-1">
                Se generará automáticamente al crear la clase.
              </p>
            </div>
          </div>
        </div>

        <!-- Buttons (dentro del form) -->
        <div class="pt-2 flex items-center justify-end gap-2">
            <p 
                *ngIf="errorMsg" 
                class="mt-4 text-center text-sm font-medium text-red-600 bg-red-100 border border-red-300 rounded-md py-2 px-3">
                {{ errorMsg }}
            </p>
            <p *ngIf="successMsg"
                class="mb-4 text-center text-sm font-medium text-green-700 bg-green-100 border border-green-300 rounded-md py-2 px-3">
                {{ successMsg }}
            </p>
          <button
          routerLink="/home"
            type="button"
            class="h-10 px-4 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-sm font-medium text-gray-700 transition"
          >
            Cancelar
          </button>

          <button
            type="submit"
            [disabled]="creando"
            class="h-10 px-5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-sm font-semibold text-white disabled:opacity-50"
          >
            {{ creando ? 'Creando...' : 'Crear clase' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
