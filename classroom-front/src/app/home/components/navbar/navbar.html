<nav class="bg-gray-900 shadow-md">
  <div class="w-full px-3 sm:px-4">
    <div class="h-16 flex items-center justify-between gap-2">

      <!-- LEFT -->
      <div class="flex items-center gap-2 sm:gap-3 min-w-0">
        <!-- boton 3 rayas -->
        <button
          type="button"
          (click)="onToggle($event)"
          class="h-10 w-10 grid place-items-center rounded-md hover:bg-white/10 transition shrink-0"
          aria-label="Abrir menú"
        >
          <svg class="h-6 w-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>

        <!-- logo + texto (texto se oculta en móvil) -->
        <div class="flex items-center gap-2 min-w-0">
          <img src="images/pizarra.png" alt="Classroom" class="h-7 w-7 sm:h-8 sm:w-8 object-contain shrink-0" />
            <h2 class="block text-base sm:text-xl font-medium text-gray-100 truncate">
              Classroom
            </h2>
        </div>
      </div>

      <!-- CENTER (solo desde sm) -->
      <h1 class="hidden sm:block text-xl font-semibold text-white">
        Mis clases
      </h1>

      <!-- RIGHT -->
      <div class="flex items-center gap-2 sm:gap-4 shrink-0">

        <!-- Botones largos SOLO en sm+ -->
        <a
          routerLink="/home/unirseClase"
          *ngIf="rol === 'alumno' || rol === 'admin'"
          class="hidden sm:inline-flex bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-medium transition"
        >
          unirse a clase
        </a>

        <a
          routerLink="/home/crearClase"
          *ngIf="rol === 'profesor' || rol === 'admin'"
          class="hidden sm:inline-flex bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-medium transition"
        >
          crear clase
        </a>

        <!-- Versión móvil: botones compactos -->
        <a
          routerLink="/home/unirseClase"
          *ngIf="rol === 'alumno' || rol === 'admin'"
          class="sm:hidden h-10 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold grid place-items-center transition"
        >
          unirse
        </a>

        <a
          routerLink="/home/crearClase"
          *ngIf="rol === 'profesor' || rol === 'admin'"
          class="sm:hidden h-10 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold grid place-items-center transition"
        >
          crear
        </a>

        <!-- Perfil -->
        <a routerLink="/perfil" class="h-10 w-10 grid place-items-center rounded-full hover:bg-white/10 transition">
          <img
            [src]="fotoSrc"
            (error)="onFotoError()"
            alt="Perfil"
            class="h-9 w-9 rounded-full object-cover bg-white border-2 border-white/70"
          />
        </a>
      </div>
    </div>
  </div>
</nav>
