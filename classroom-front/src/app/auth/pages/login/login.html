
    <h1 class="text-2xl font-bold text-center mb-6">Iniciar sesión</h1>

    <form (ngSubmit)="login()" (ngModelChange)="successMsg=''" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="correo@ejemplo.com"
          class="mt-1 w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          placeholder="********"
          class="mt-1 w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button 
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition"
      >
        Entrar
      </button>
      <p 
        *ngIf="errorMsg" 
        class="mt-4 text-center text-sm font-medium text-red-600 bg-red-100 border border-red-300 rounded-md py-2 px-3">
        {{ errorMsg }}
      </p>
      <p *ngIf="successMsg"
        class="mb-4 text-center text-sm font-medium text-green-700 bg-green-100 border border-green-300 rounded-md py-2 px-3">
        {{ successMsg }}
      </p>


    </form>

    <p class="text-sm text-center text-gray-600 mt-6">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="text-blue-600 hover:underline">Regístrate</a>
    </p>
