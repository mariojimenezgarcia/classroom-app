<div
  [ngClass]="fullscreen
    ? 'fixed inset-0 bg-black/30 flex items-center justify-center z-50'
    : 'flex items-center justify-center gap-3'"
>
  <div class="flex flex-col items-center justify-center gap-3 bg-white rounded-xl px-6 py-4 shadow-lg">
    <div
      class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"
    ></div>

    <p class="text-sm font-medium text-gray-700">
      {{ text }}
    </p>
  </div>
</div>
