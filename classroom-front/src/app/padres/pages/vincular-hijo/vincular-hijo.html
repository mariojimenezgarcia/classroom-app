<div class="min-h-[70vh] flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md sm:max-w-xl lg:max-w-3xl bg-white border border-gray-200 rounded-2xl shadow-sm p-6 sm:p-8">
    <h2 class="text-2xl font-bold text-gray-900 text-center">Vincular alumno</h2>
    <p class="text-gray-600 text-center mt-2">
      Introduce el <span class="font-semibold">código de tu hijo</span> para ver sus notas.
    </p>

    <div class="mt-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">Código del alumno</label>
      <input
        type="text"
        [(ngModel)]="codigoAlumno"
        placeholder="Ej: A1B2C3D4"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <p class="text-xs text-gray-500 mt-2">
        El alumno lo encuentra en su perfil.
      </p>
    </div>

    <div class="mt-4 text-red-600 text-sm" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="mt-4 text-green-700 text-sm" *ngIf="okMsg">{{ okMsg }}</div>

    <button
      type="button"
      (click)="vincular()"
      [disabled]="loading || !codigoAlumno.trim()"
      class="mt-6 w-full px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 text-white font-semibold"
    >
      {{ loading ? 'Vinculando...' : 'Vincular' }}
    </button>
  </div>
</div>
