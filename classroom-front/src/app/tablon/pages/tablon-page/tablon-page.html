<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
  <app-crear-card-publicacion
    [claseId]="claseId"
    [rol]="rol"
    (publicacionCreada)="agregarPublicacion($event)">
  </app-crear-card-publicacion>

  <div class="lg:col-span-2">
    <div class="space-y-4">
      <div *ngFor="let p of publicaciones">
        <app-card-publicacion
          [publicacion]="p"
          [miUsuarioId]="miUsuarioId"
          (publicacionBorrada)="quitarPublicacion($event)">
        </app-card-publicacion>
      </div>
    </div>
  </div>
</div>
