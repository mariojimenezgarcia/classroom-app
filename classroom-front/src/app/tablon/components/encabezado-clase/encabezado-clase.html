<!-- Header -->
<div class="h-28 relative" [ngStyle]="{ 'background-color': color || '#6d28d9' }">
  <div class="absolute bottom-4 left-4 text-white">
    <h1 class="text-2xl font-semibold leading-tight">
      {{ nombre }}
    </h1>

    <p class="text-sm opacity-90">
      Curso: {{ curso || '-' }} • Aula: {{ aula || '-' }}
    </p>
  </div>

  <div class="absolute bottom-4 right-4 flex items-center gap-2">
    <button
      [routerLink]="['/home/mostrarAlumnos', claseId]"
      class="bg-white/15 hover:bg-white/25 text-white text-sm px-3 py-2 rounded-xl transition">
      Ver alumnos
    </button>
  </div>
</div>

<!-- Tabs -->
<div class="flex gap-2 border-b px-4 py-3 bg-white">

  <a
    [routerLink]="['/tablon/mostrarClase', claseId]"
    routerLinkActive="bg-slate-900 text-white"
    [routerLinkActiveOptions]="{ exact: true }"
    class="px-3 py-2 rounded-xl text-sm font-medium hover:bg-slate-100 text-slate-700">
    Tablón
  </a>

  <a
    [routerLink]="['/tablon/tareas', claseId]"
    routerLinkActive="bg-slate-900 text-white"
    [routerLinkActiveOptions]="{ exact: true }"
    class="px-3 py-2 rounded-xl text-sm font-medium hover:bg-slate-100 text-slate-700">
    Tareas
  </a>
</div>
