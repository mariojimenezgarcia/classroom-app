<div class="min-h-screen bg-gray-50 px-4 py-8">
  <div class="mx-auto w-full max-w-3xl">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
      <!-- Header -->
      <div class="px-6 py-5 border-b border-gray-200">
        <h1 class="text-lg font-semibold text-gray-900">Unirse a una clase</h1>
        <p class="text-sm text-gray-500 mt-1">
          Introduce el código de tu nueva clase
        </p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="unirseClase()" class="px-6 py-6 space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700">
            Código de la clase <span class="text-red-500">*</span>
          </label>

          <input
          [(ngModel)]="codigo"
          name="codigo"
          type="codigo"
            type="text"
            placeholder="Ej. A7D92KLM"
            class="mt-2 w-full h-11 rounded-xl border border-gray-200 px-4 text-sm tracking-widest uppercase outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-300"
            autocomplete="off"
          />

          <p class="mt-2 text-xs text-gray-500">
            Pide el código a tu profesor. Se suele ver como 8 caracteres (letras y números).
          </p>
        </div>

        <!-- Buttons -->
        <div class="pt-1 flex items-center justify-end gap-2">
          <p 
                *ngIf="errorMsg" 
                class="mt-4 text-center text-sm font-medium text-red-600 bg-red-100 border border-red-300 rounded-md py-2 px-3">
                {{ errorMsg }}
            </p>
            <p *ngIf="successMsg"
                class="mb-4 text-center text-sm font-medium text-green-700 bg-green-100 border border-green-300 rounded-md py-2 px-3">
                {{ successMsg }}
            </p>
          <button
            routerLink="/home"
            type="button"
            class="h-10 px-4 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-sm font-medium text-gray-700 transition"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="h-10 px-5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-sm font-semibold text-white transition"
          >
            Unirse
          </button>
        </div>
      </form>
    </div>

    <!--Footer -->
    <p class="text-center text-xs text-gray-400 mt-4">
      Si el código no funciona, revisa que no haya espacios y que esté escrito correctamente.
    </p>
  </div>
</div>
