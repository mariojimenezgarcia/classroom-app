<div class="min-h-screen bg-gray-50 px-4 py-8">
  <div class="mx-auto w-full max-w-3xl">
    <div class="w-full bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">

      <!-- Header -->
      <div class="px-6 py-5 border-b border-gray-200">
        <h1 class="text-lg font-semibold text-gray-900">
          Código de la clase
        </h1>
        <p class="text-sm text-gray-500 mt-1">
          Comparte este código con tus alumnos.
        </p>
      </div>

      <!-- Content -->
      <div class="px-6 py-6">

        <!-- Loading -->
        <div *ngIf="loading" class="text-center text-gray-500 py-6">
          Cargando código...
        </div>

        <!-- Error -->
        <div *ngIf="error" class="text-center text-red-600 py-6">
          {{ error }}
        </div>

        <!-- Código -->
        <div *ngIf="!loading && !error">

          <div class="text-center mb-4">
            <p class="text-sm text-gray-500">
              {{ nombreClase }}
            </p>
          </div>

          <div class="rounded-2xl border border-gray-200 bg-gray-50 p-6 text-center">
            <p class="text-xs text-gray-500">Código</p>
            <p class="mt-2 text-3xl font-bold tracking-widest text-gray-900">
              {{ codigo }}
            </p>
          </div>

          <!-- Botones -->
          <div class="mt-6 flex items-center justify-end gap-2">
            <button
              type="button"
              (click)="volver()"
              class="h-10 px-4 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-sm font-medium text-gray-700 transition"
            >
              Volver
            </button>

            <button
              type="button"
              (click)="copiar()"
              class="h-10 px-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-sm font-semibold text-white transition"
            >
              Copiar
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
