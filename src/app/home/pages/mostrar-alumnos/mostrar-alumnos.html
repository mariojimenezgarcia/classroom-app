<div class="min-h-screen bg-gray-50">
  <div class="mx-auto max-w-7xl px-6 py-8">

    <!-- Loading -->
    <div *ngIf="loading" class="text-center text-gray-500 py-10">
      Cargando personas...
    </div>

    <!-- Error -->
    <div *ngIf="error" class="text-center text-red-600 py-10">
      {{ error }}
    </div>

    <!-- Contenido -->
    <div *ngIf="!loading && !error">

      <!-- Cabecera clase -->
      <div class="rounded-2xl border border-gray-200 bg-white shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200">
          <h1 class="text-xl font-semibold text-gray-900">
            {{ nombreClase }}
          </h1>

          <div class="mt-2 flex flex-wrap gap-2 text-sm text-gray-600">
            <span *ngIf="curso"
                  class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-3 py-1">
              <span class="h-2 w-2 rounded-full bg-indigo-600"></span>
              Curso: {{ curso }}
            </span>

            <span *ngIf="aula"
                  class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-3 py-1">
              Aula: {{ aula }}
            </span>
          </div>
        </div>

        <!-- Tabla personas -->
        <div class="px-6 py-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-semibold text-gray-900">Personas</h2>
          </div>

          <div class="overflow-auto rounded-2xl border border-gray-200">
            <table class="min-w-[720px] w-full text-sm">
              <thead class="bg-gray-50 text-gray-700">
                <tr>
                  <th class="text-left px-4 py-3 font-semibold">Nombre</th>
                  <th class="text-left px-4 py-3 font-semibold">Email</th>
                  <th class="text-left px-4 py-3 font-semibold">Rol</th>
                </tr>
              </thead>

              <tbody class="bg-white">

                <tr *ngFor="let persona of personas" class="border-t">

                  <!-- Nombre -->
                  <td class="px-4 py-3 font-medium text-gray-900">
                    {{ persona.nombre }}
                  </td>

                  <!-- Email -->
                  <td class="px-4 py-3 text-gray-700">
                    {{ persona.email }}
                  </td>

                  <!-- Rol -->
                  <td class="px-4 py-3">
                    <!-- PROFESOR -->
                    <span *ngIf="persona.rol.toLowerCase() === 'profesor'"
                          class="inline-flex items-center rounded-full bg-emerald-50 text-emerald-700 px-3 py-1 text-xs font-semibold">
                      PROFESOR
                    </span>

                    <!-- ALUMNO -->
                    <span *ngIf="persona.rol.toLowerCase() === 'alumno'"
                          class="inline-flex items-center rounded-full bg-indigo-50 text-indigo-700 px-3 py-1 text-xs font-semibold">
                      ALUMNO
                    </span>
                  </td>

                </tr>

                <!-- Si no hay personas -->
                <tr *ngIf="personas.length === 0" class="border-t">
                  <td colspan="3" class="px-4 py-6 text-center text-gray-400">
                    No hay personas inscritas en esta clase.
                  </td>
                </tr>

              </tbody>
            </table>
          </div>

          <!-- Botón volver -->
          <div class="mt-6 flex justify-end">
            <button
              (click)="volver()"
              class="h-10 px-4 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-sm font-medium text-gray-700 transition"
            >
              Volver
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
